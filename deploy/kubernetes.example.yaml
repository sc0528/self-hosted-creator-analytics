apiVersion: v1
kind: ConfigMap
metadata:
  name: viewloom-static
  namespace: example-apps
data:
  README: "Build this ConfigMap from dashboard/index.html in your own deployment process."
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: viewloom
  namespace: example-apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: viewloom
  template:
    metadata:
      labels:
        app: viewloom
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: viewloom
  namespace: example-apps
spec:
  selector:
    app: viewloom
  ports:
    - port: 80
      targetPort: 80
