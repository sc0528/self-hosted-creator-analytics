name: Publish Viewloom container

on:
  pull_request:
    branches: [main]
    paths:
      - Dockerfile
      - .dockerignore
      - index.html
      - dashboard/**
      - assets/**
      - deploy/docker-compose.yml
      - .github/workflows/container.yml
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - Dockerfile
      - .dockerignore
      - index.html
      - dashboard/**
      - assets/**
      - deploy/docker-compose.yml
      - .github/workflows/container.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Validate Compose configuration
        run: docker compose -f deploy/docker-compose.yml config --quiet
      - name: Smoke-test container
        run: |
          docker build --tag viewloom-smoke .
          container_id=$(docker run --detach --publish 8080:80 viewloom-smoke)
          trap 'docker rm --force "$container_id"' EXIT
          for attempt in {1..15}; do
            if curl --fail --silent http://127.0.0.1:8080/dashboard/ | grep --quiet "Know what to make next"; then
              exit 0
            fi
            sleep 1
          done
          docker logs "$container_id"
          exit 1
      - name: Sign in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha
      - name: Build and publish image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
